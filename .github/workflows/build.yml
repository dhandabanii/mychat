name: Build and Deploy Flutter Web and APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        working-directory: ./frontend
        run: flutter pub get

      - name: Build Web App
        working-directory: ./frontend
        run: |
          flutter build web --release --web-renderer canvaskit > build_error_log.txt 2>&1 || true
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add build_error_log.txt
          git commit -m "ci: capture web build error log" || true
          git push || true
          # We check if build succeeded by checking if build/web index.html exists
          if [ ! -f "build/web/index.html" ]; then
            echo "Build failed!"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/build/web

